<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>frend — Coming Soon</title>
    <meta name="description" content="frend is coming soon. Something special is on the way. Stay tuned.">
    <meta property="og:title" content="frend — Coming Soon">
    <meta property="og:description" content="Something special is on the way. Stay tuned.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tryfrend.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🟣</text></svg>">
</head>
<body>
    <!-- Soft ambient glow blobs -->
    <div class="bg-glow" aria-hidden="true">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <main class="container">
        <div class="content">
            <!-- Logo SVG -->
            <div class="logo-wrapper" id="logo">
                <img src="logo.svg" alt="frend" class="logo-img">
            </div>

            <!-- Coming Soon Text -->
            <div class="coming-soon-section">
                <p class="coming-soon-text">coming soon</p>
            </div>

            <!-- Subtle divider -->
            <div class="divider" aria-hidden="true"></div>

            <!-- Email Signup — powered by Formsubmit.co (sends to hello@tryfrend.com) -->
            <div class="signup-section">
                <p class="signup-text">Be the first to know when we launch</p>
                <form class="signup-form" id="signup-form" action="https://formsubmit.co/hello@tryfrend.com" method="POST">
                    <!-- Formsubmit config: disable captcha, redirect back to site -->
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_next" value="https://tryfrend.com?submitted=true">
                    <input type="hidden" name="_subject" value="New frend waitlist signup!">
                    <input type="text" name="_honey" style="display:none">
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            name="email"
                            id="email-input"
                            placeholder="your@email.com" 
                            required
                            autocomplete="email"
                        >
                        <button type="submit" id="notify-btn">
                            <span class="btn-text">Notify Me</span>
                            <span class="btn-arrow">→</span>
                        </button>
                    </div>
                </form>
                <p class="signup-note" id="form-message">No spam, ever. We promise.</p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2025 frend. All rights reserved.</p>
        </footer>
    </main>

    <script>
        // Show confirmation if redirected back after form submission
        if (window.location.search.includes('submitted=true')) {
            const message = document.getElementById('form-message');
            const input = document.getElementById('email-input');
            const btn = document.getElementById('notify-btn');
            
            btn.innerHTML = '<span class="btn-text">✓ You\'re in!</span>';
            btn.classList.add('submitted');
            message.textContent = "We'll be in touch soon!";
            message.style.color = '#1f003d';
            input.placeholder = 'Thanks for signing up!';
            input.disabled = true;

            // Clean URL
            history.replaceState(null, '', window.location.pathname);
        }
    </script>
</body>
</html>
